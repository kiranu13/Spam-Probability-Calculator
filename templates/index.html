<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Spam Detection System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background: linear-gradient(135deg,#1e3c72,#2a5298);
font-family:'Segoe UI',sans-serif;
min-height:100vh;
}

.navbar{
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.main-container{
margin-top:80px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

textarea{
resize:none;
}

.analyze-btn{
background:#0d6efd;
border:none;
}

.analyze-btn:hover{
background:#0b5ed7;
}

.result-box{
margin-top:20px;
}

footer{
margin-top:40px;
text-align:center;
color:white;
font-size:14px;
}

</style>

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<span class="navbar-brand mb-0 h1">

<i class="fa-solid fa-robot"></i>
 Spam Detection System

</span>

</div>

</nav>

<!-- Main Container -->

<div class="container main-container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4">

<h4 class="text-center mb-3">

<i class="fa-solid fa-envelope"></i>
Message Analyzer

</h4>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Enter Email or SMS Message
</label>

<textarea
class="form-control"
name="message"
rows="4"
placeholder="Example: Win free money now!!!"
required></textarea>

</div>

<div class="d-grid">

<button class="btn analyze-btn btn-lg text-white">

<i class="fa-solid fa-magnifying-glass"></i>
Analyze Message

</button>

</div>

</form>

<!-- RESULT SECTION -->

{% if result %}

<div class="result-box text-center">

<h5 class="mt-4">
Prediction: <b>{{ result }}</b>
</h5>

<h6>
Confidence: {{ probability }}%
</h6>

</div>

<div class="progress mt-3">

<div
class="progress-bar
{% if result == 'spam' %}bg-danger{% else %}bg-success{% endif %}"
role="progressbar"
style="width: {{ probability }}%">

{{ probability }}%

</div>

</div>

{% if result == "spam" %}

<div class="alert alert-danger mt-3">

<i class="fa-solid fa-triangle-exclamation"></i>
This message is classified as <b>SPAM</b>

</div>

{% else %}

<div class="alert alert-success mt-3">

<i class="fa-solid fa-circle-check"></i>
This message is classified as <b>NOT SPAM</b>

</div>

{% endif %}

{% endif %}

<!-- History Button -->

<div class="d-grid mt-4">

<a href="/history" class="btn btn-secondary">

<i class="fa-solid fa-clock-rotate-left"></i>
View Message History

</a>

</div>

</div>

</div>

</div>

</div>

<footer>



</footer>

</body>

</html>python <app class="py"></app>
